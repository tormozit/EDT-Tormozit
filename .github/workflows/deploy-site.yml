name: Deploy p2 Update Site with History

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Read release version
        id: version
        run: |
          VER=$(grep 'comfort.release=' site/version.txt | cut -d= -f2)
          echo "release_version=$VER" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn -B clean package

      - name: Checkout existing gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          # If branch does not exist yet, continue-on-error allows skipping
        continue-on-error: true

      - name: Prepare version folder
        run: |
          mkdir -p deploy
          # Copy new build artifacts into versioned subfolder
          cp -r site/target/repository "deploy/${{ steps.version.outputs.release_version }}"

          # If gh-pages branch already exists, copy previous release folders
          if [ -d "gh-pages" ]; then
            for dir in gh-pages/*/; do
              name=$(basename "$dir")
              # Skip composite site files
              if [[ "$name" != "p2.index" && "$name" != "compositeContent.jar" && "$name" != "compositeArtifacts.jar" && "$name" != "index.html" ]]; then
                if [ ! -d "deploy/$name" ]; then
                  cp -r "$dir" "deploy/$name"
                fi
              fi
            done
          fi

      - name: Generate composite metadata
        run: |
          python3 << 'PYEOF'
          import os, time, zipfile

          deploy_dir = "deploy"
          timestamp = str(int(time.time() * 1000))

          # List child repos (version folders), newest first
          children = [d for d in sorted(os.listdir(deploy_dir), reverse=True)
                      if os.path.isdir(os.path.join(deploy_dir, d)) and not d.startswith('.')]

          # compositeContent.xml
          content_xml = f'''<?xml version="1.0" encoding="UTF-8"?>
<repository name="EDT Comfort Update Site" type="org.eclipse.equinox.internal.p2.metadata.repository.CompositeMetadataRepository" version="1.0.0">
  <properties size="1">
    <property name="p2.timestamp" value="{timestamp}"/>
  </properties>
  <children size="{len(children)}">
'''
          for child in children:
              content_xml += f'    <child location="{child}"/>\n'
          content_xml += '''  </children>
</repository>
'''

          # compositeArtifacts.xml
          artifacts_xml = f'''<?xml version="1.0" encoding="UTF-8"?>
<repository name="EDT Comfort Update Site" type="org.eclipse.equinox.internal.p2.artifact.repository.CompositeArtifactRepository" version="1.0.0">
  <properties size="1">
    <property name="p2.timestamp" value="{timestamp}"/>
  </properties>
  <children size="{len(children)}">
'''
          for child in children:
              artifacts_xml += f'    <child location="{child}"/>\n'
          artifacts_xml += '''  </children>
</repository>
'''

          # Pack to JAR
          def write_jar(name, xml_content):
              jar_path = os.path.join(deploy_dir, name)
              xml_name = name.replace('.jar', '.xml')
              with zipfile.ZipFile(jar_path, 'w', zipfile.ZIP_DEFLATED) as zf:
                  zf.writestr(xml_name, xml_content)

          write_jar('compositeContent.jar', content_xml)
          write_jar('compositeArtifacts.jar', artifacts_xml)

          # p2.index for composite site
          p2_index = '''version=1
metadata.repository.factory.order=compositeContent.jar,!
artifact.repository.factory.order=compositeArtifacts.jar,!
'''
          with open(os.path.join(deploy_dir, 'p2.index'), 'w') as f:
              f.write(p2_index)

          print("Generated composite site with children:", children)
          PYEOF

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
          clean: true
          # Keep existing version folders (pattern x.x.x.x)
          clean-exclude: |
            [0-9]*.[0-9]*.[0-9]*.[0-9]*/
          commit-message: "Add update site ${{ steps.version.outputs.release_version }}"
